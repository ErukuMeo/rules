# Generated Mihomo / Clash.Meta fragment for Sub-Store profile merging.
# Policy group names must match source/rules.json.

rule-providers:
  ai:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/ai.yaml
    path: ./ruleset/ai.yaml
    interval: 86400
  streaming:
    type: http
    behavior: classical
