    path: ./ruleset/streaming.yaml
    interval: 86400
  apple:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/apple.yaml
    path: ./ruleset/apple.yaml
    interval: 86400
  microsoft:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/microsoft.yaml
    path: ./ruleset/microsoft.yaml
    interval: 86400
  cn:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/cn.yaml
    path: ./ruleset/cn.yaml
    interval: 86400
  proxy:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/proxy.yaml
    path: ./ruleset/proxy.yaml
    interval: 86400
  direct:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/direct.yaml
    path: ./ruleset/direct.yaml
