  reject:
    type: http
    behavior: classical
    format: yaml
    url: https://raw.githubusercontent.com/ErukuMeo/rules/main/dist/mihomo/rules/reject.yaml
    path: ./ruleset/reject.yaml
    interval: 86400

rules:
  - RULE-SET,ai,AI
  - RULE-SET,streaming,STREAMING
  - RULE-SET,apple,APPLE
  - RULE-SET,microsoft,MICROSOFT
  - RULE-SET,cn,DIRECT
  - RULE-SET,proxy,PROXY
