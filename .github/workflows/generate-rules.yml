name: Generate Rules

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify generated rules
        run: python scripts/generate_rules.py --check

      - name: Upload generated rules
        uses: actions/upload-artifact@v4
        with:
          name: generated-rules
          path: dist/
